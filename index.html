<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Inscryption Webport</title>

    <style>
      body {
        margin: 0;
        background: #0f0f10;
        color: #e6e6e6;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }

      #unity-canvas {
        width: 960px;
        height: 600px;
        display: block;
        margin: auto;
        background: #231F20;
      }

      #loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #0b0b0c;
      }

      #text {
        font-size: 13px;
        text-align: center;
      }

      #slider {
        width: 420px;
        accent-color: #7c5cff;
      }

      #fsBtn {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 10;
        background: #1a1a1d;
        color: #e6e6e6;
        border: 1px solid #333;
        padding: 8px 10px;
        cursor: pointer;
        border-radius: 6px;
      }

      #fsBtn:hover {
        background: #242428;
      }
    </style>
  </head>

  <body>
    <button id="fsBtn">Fullscreen</button>

    <div id="loader">
      <div id="text">Downloading...</div>
      <input id="slider" type="range" min="0" max="100" value="0" disabled>
    </div>

    <canvas id="unity-canvas"></canvas>

    <script src="Build/7a2dbded24d57e056180125b1583e7c4.loader.js"></script>

    <script>
      const state = {
        total: 0,
        loaded: 0,
        done: false
      }

      function mb(v) {
        return v / 1048576
      }

      function render() {
        const percent = state.total ? (state.loaded / state.total) * 100 : 0

        document.getElementById("slider").value = percent

        const text = document.getElementById("text")

        if (state.done) {
          text.textContent =
            "Download complete (" + mb(state.total).toFixed(2) + " MB)"
          return
        }

        text.textContent =
          "Downloading: " +
          mb(state.loaded).toFixed(2) + " MB of " +
          mb(state.total || state.loaded).toFixed(2) + " MB (" +
          percent.toFixed(1) + "%)"
      }

      const nativeFetch = window.fetch

      window.fetch = async function(input, init) {
        const url = typeof input === "string" ? input : input.url

        if (!url.includes("473b9593aa93436d0dfd3c30217f126b.data")) {
          return nativeFetch(input, init)
        }

        const base = "Build/473b9593aa93436d0dfd3c30217f126b.data.part_"
        const alphabet = "abcdefghijklmnopqrstuvwxyz"

        const chunks = []
        let totalBytes = 0
        let loadedBytes = 0

        for (let i = 0; i < alphabet.length; i++) {
          for (let j = 0; j < alphabet.length; j++) {
            const suffix = alphabet[i] + alphabet[j]
            const partUrl = base + suffix

            const res = await nativeFetch(partUrl)

            if (!res.ok) {
              state.total = totalBytes
              state.loaded = loadedBytes
              state.done = true
              render()
              const blob = new Blob(chunks)
              return new Response(blob)
            }

            const buf = await res.arrayBuffer()
            chunks.push(buf)

            loadedBytes += buf.byteLength
            totalBytes += buf.byteLength

            state.total = totalBytes
            state.loaded = loadedBytes
            render()
          }
        }

        state.total = totalBytes
        state.loaded = loadedBytes
        state.done = true
        render()

        const blob = new Blob(chunks)
        return new Response(blob)
      }

      const canvas = document.getElementById("unity-canvas")

      document.getElementById("fsBtn").onclick = function() {
        if (canvas.requestFullscreen) canvas.requestFullscreen()
        else if (canvas.webkitRequestFullscreen) canvas.webkitRequestFullscreen()
        else if (canvas.mozRequestFullScreen) canvas.mozRequestFullScreen()
        else if (canvas.msRequestFullscreen) canvas.msRequestFullscreen()
      }

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        const meta = document.createElement("meta")
        meta.name = "viewport"
        meta.content = "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no"
        document.head.appendChild(meta)

        canvas.style.width = "100%"
        canvas.style.height = "100%"
        canvas.style.position = "fixed"
      }

      createUnityInstance(canvas, {
        dataUrl: "Build/473b9593aa93436d0dfd3c30217f126b.data",
        frameworkUrl: "Build/7492dd364cd7595cfa9d018ad373b295.framework.js",
        codeUrl: "Build/2a21aa2df9743ada0aa5cac7d789934d.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Daniel Mullins Games",
        productName: "Inscryption",
        productVersion: "Release"
      }).then(() => {
        document.getElementById("loader").style.display = "none"
      })
    </script>
  </body>
</html>
